spring.application.name=money-tracker

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=money_tracker;encrypt=true;trustServerCertificate=true}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=5000

# Kept for compatibility with projects that use jwt.* keys.
jwt.secret=${JWT_SECRET:defaultSecretKeyChangeMe}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Used by TokenService (@Value("${api.security.token.secret}")).
api.security.token.secret=${JWT_SECRET:defaultSecretKeyChangeMe}
